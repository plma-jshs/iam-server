name: NAMESPACE VALIDATION
on:
  push:
    branches: [main, rc]
    paths:
      - "namespaces/**"
      - "**.zed"
  pull_request:
    branches: [main, rc]
    paths:
      - "schema/**"
      - "**.zed"
jobs:
  validate-namespace:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Validate Schema Folder
        uses: authzed/action-spicedb-validate@v1
        with:
          validationfile: "namespaces/*"

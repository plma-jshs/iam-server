name: CD

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Build and Test
        run: |
          go build -o iam-server.exe ./cmd/server

      - name: Deploy to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.PLMA_REMOTE_HOST }}
          username: ${{ secrets.PLMA_REMOTE_USER }}
          key: ${{ secrets.PLMA_SSH_PRIVATE_KEY }}
          port: ${{ secrets.PLMA_REMOTE_PORT }}
          source: "iam-server.exe"
          target: "/tmp"
